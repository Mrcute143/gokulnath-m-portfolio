<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="/img/WEBP/g logo.webp" type="image/x-icon">
    <title>404 | ARCHIVE NOT FOUND</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&family=Space+Mono&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #121212;
            --text-primary: #E7E7E7;
            --accent: #8A7BFE; /* Namma Design Gallery Original Accent */
            --terminal-bg: #1A1A1A;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body, html {
            width: 100%; height: 100%;
            background-color: var(--bg-color);
            background-image: url('/VintageDust\ \(3\).jpg'); /* Gallery background */
            background-size: cover; background-attachment: fixed;
            color: var(--text-primary);
            font-family: 'Space Mono', monospace;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            overflow: hidden; user-select: none;
        }

        /* MASSIVE BACKGROUND 404 (STROKE ONLY) */
        .bg-massive-404 {
            position: absolute;
            top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-family: 'Space Grotesk', sans-serif;
            font-size: clamp(15rem, 45vw, 40rem);
            font-weight: 700; color: transparent;
            -webkit-text-stroke: 3px rgba(138, 123, 254, 0.15); /* Faint accent color outline */
            z-index: 0; pointer-events: none; white-space: nowrap;
            letter-spacing: -10px;
            animation: float 6s ease-in-out infinite;
        }
        @keyframes float {
            0% { transform: translate(-50%, -50%); }
            50% { transform: translate(-50%, -52%); }
            100% { transform: translate(-50%, -50%); }
        }

        /* ULTRA-SLOW INFINITE MARQUEE */
        .marquee-bg {
            position: fixed; width: 100%; background: var(--accent); color: #121212;
            font-weight: bold; padding: 10px 0; top: 0; left: 0; z-index: 100;
            border-bottom: 2px solid var(--text-primary); display: flex; overflow: hidden;
        }
        /* 🔴 Speed mathiyachu: 20s to 40s for ultra-slow smooth scroll */
        .marquee-content { display: flex; width: 200%; animation: marquee 40s linear infinite; }
        .marquee-text { white-space: nowrap; font-size: 0.85rem; padding-right: 50px; flex-shrink: 0; letter-spacing: 2px;}
        @keyframes marquee { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }

        /* BRUTALIST MAIN CONTAINER */
        .error-wrapper {
            background: rgba(26, 26, 26, 0.9); backdrop-filter: blur(8px);
            border: 2px solid var(--accent);
            box-shadow: 15px 15px 0px rgba(138, 123, 254, 0.2);
            padding: 40px 30px; z-index: 10; max-width: 500px; width: 90%;
            display: flex; flex-direction: column; align-items: center; text-align: center;
        }

        /* DISTORTED SMILEY SVG */
        .smiley-container { margin-bottom: 20px; }
        .smiley-svg {
            width: 80px; height: 80px;
            stroke: var(--accent); fill: none; stroke-width: 5; stroke-linecap: round;
        }

        /* TITLE */
        .glitch-title {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 3rem; text-transform: uppercase;
            margin: 0 0 5px 0; color: var(--text-primary);
            letter-spacing: 2px; line-height: 1;
        }
        .subtitle { color: var(--accent); font-size: 0.9rem; margin-bottom: 25px; font-weight: bold; letter-spacing: 1px;}
        
        /* TERMINAL LOG */
        .terminal-log {
            width: 100%;
            background: #050505; border: 1px dashed #444;
            padding: 15px; margin-bottom: 25px; text-align: left;
            font-size: 0.8rem; color: #00ff41; line-height: 1.6;
            height: 110px; overflow-y: hidden; position: relative;
        }
        .log-line { opacity: 0; animation: fadeIn 0.1s forwards; margin-bottom: 5px;}
        .log-warn { color: #ffbd2e; } 
        @keyframes fadeIn { to { opacity: 1; } }

        /* BRUTALIST BUTTON */
        .btn-action {
            width: 100%; background: transparent; color: var(--accent);
            border: 1px solid var(--accent); padding: 15px; font-family: 'Space Mono', monospace;
            font-size: 0.95rem; cursor: pointer; text-transform: uppercase; transition: 0.3s;
            outline: none; font-weight: bold; letter-spacing: 2px;
        }
        .btn-action:hover, .btn-action:focus { background: var(--accent); color: #121212; }

        @media (max-width: 768px) {
            .glitch-title { font-size: 2.5rem; }
            .bg-massive-404 { font-size: 60vw; -webkit-text-stroke: 2px rgba(138, 123, 254, 0.2); }
            .error-wrapper { padding: 30px 20px; }
        }
    </style>
</head>
<body>

    <div class="marquee-bg">
        <div class="marquee-content">
            <span class="marquee-text">/// OOPS! /// ARCHIVE MODULE NOT FOUND /// OOPS! /// ARCHIVE MODULE NOT FOUND ///</span>
            <span class="marquee-text">/// OOPS! /// ARCHIVE MODULE NOT FOUND /// OOPS! /// ARCHIVE MODULE NOT FOUND ///</span>
        </div>
    </div>

    <div class="bg-massive-404">404</div>

    <div class="error-wrapper">
        
        <div class="smiley-container">
            <svg class="smiley-svg" viewBox="0 0 100 100">
                <defs>
                    <filter id="distort">
                        <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="2" result="noise" />
                        <feDisplacementMap in="SourceGraphic" in2="noise" scale="5" xChannelSelector="R" yChannelSelector="G" />
                    </filter>
                </defs>
                <g filter="url(#distort)">
                    <circle cx="50" cy="50" r="40" />
                    <line x1="32" y1="35" x2="42" y2="45" /><line x1="42" y1="35" x2="32" y2="45" />
                    <line x1="58" y1="35" x2="68" y2="45" /><line x1="68" y1="35" x2="58" y2="45" />
                    <path d="M 35 65 Q 50 55 65 65" />
                </g>
            </svg>
        </div>

        <h1 class="glitch-title">LOST?</h1>
        <p class="subtitle">[ 404 - ENTITY MISSING ]</p>
        
        <div class="terminal-log" id="terminal-log">
            </div>

        <button class="btn-action" onclick="window.location.href='/'">[ RETURN TO ARCHIVE ]</button>
    </div>
